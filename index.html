
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCAI Monitoring System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@0.0.3"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top left, #0f2027, #203a43, #000000);
    color: white;
    overflow-x: hidden;
}

header {
    text-align: center;
    padding: 25px 15px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,255,255,0.2);
}

header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin: 0;
    background: linear-gradient(90deg, #00f2ff, #00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header a {
    color: #00f2ff;
    text-decoration: none;
    font-weight: 600;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 30px 20px;
}

.video-box {
    width: 100%;
    max-width: 480px;
}

video {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,255,255,0.4);
}

.panel {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
    border: 1px solid rgba(0,255,255,0.15);
}

.metric {
    margin: 12px 0;
    font-size: 16px;
}

.metric span {
    font-weight: 600;
    color: #00f2ff;
}

.status {
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
}

.safe { color: #00ff88; }
.warning { color: #ffaa00; }
.drowsy { color: #ff0033; }

.footer {
    text-align: center;
    padding: 20px;
    font-size: 14px;
    opacity: 0.7;
}

@media (min-width: 768px) {
    header h1 {
        font-size: 40px;
    }
}
</style>
</head>

<body>

<header>
    <h1>HCAI Monitoring System</h1>
    <p>Developed by Tejas Walke</p>
    <p>
        <a href="https://www.linkedin.com/in/tejas-walke-5422a1255/" target="_blank">
        Connect on LinkedIn
        </a>
    </p>
</header>

<div class="container">

    <div class="video-box">
        <video id="video" autoplay playsinline></video>
    </div>

    <div class="panel">
        <div class="metric">Eye Aspect Ratio (EAR): <span id="earValue">0.00</span></div>
        <div class="metric">Head Direction & Emotion: <span id="headPose">CENTER</span></div>
        <div class="metric">Fatigue Score: <span id="fatigueScore">0%</span></div>

        <div id="status" class="status safe">SAFE</div>
    </div>

</div>

<div class="footer">
    Real-Time Driver State | Fatigue Detection | Emotion Monitoring
</div>

<script src="HCAI_Advanced.js"></script>

</body>
</html>
