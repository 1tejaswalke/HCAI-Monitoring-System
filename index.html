
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCAI - Advanced Human Centered AI Monitoring</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.20.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@0.0.3"></script>

<style>
body {
    margin:0;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:'Poppins',sans-serif;
    color:white;
}

header {
    text-align:center;
    padding:20px;
}

header h1 {
    font-family:'Orbitron',sans-serif;
    margin:0;
}

header a {
    color:#00f2ff;
    text-decoration:none;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.video-box {
    width:100%;
    max-width:420px;
}

video {
    width:100%;
    border-radius:15px;
    box-shadow:0 0 20px #00f2ff;
}

.panel {
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    width:100%;
    max-width:420px;
    box-shadow:0 0 15px #00f2ff;
}

.section-title {
    margin-top:15px;
    font-weight:600;
    color:#00f2ff;
}

.metric {
    margin:6px 0;
}

.status {
    margin-top:10px;
    font-weight:bold;
}

.safe {color:#00ff88;}
.warning {color:#ffaa00;}
.drowsy {color:#ff0033;}

@media (min-width:768px){
    header h1{font-size:28px;}
}
</style>
</head>

<body>

<header>
<h1>HCAI - Advanced Monitoring System</h1>
<p>Developed by Tejas Walke</p>
<p><a href="https://www.linkedin.com/in/tejas-walke-5422a1255/" target="_blank">LinkedIn Profile</a></p>
</header>

<div class="container">

<div class="video-box">
<video id="video" autoplay playsinline></video>
</div>

<div class="panel">

<div class="section-title">Eye & Mouth Metrics</div>
<div class="metric">EAR: <strong><span id="earValue">0.00</span></strong></div>
<div class="metric">MAR: <strong><span id="marValue">0.00</span></strong></div>

<div class="section-title">Head Position</div>
<div class="metric">Direction: <strong><span id="headPose">CENTER</span></strong></div>

<div class="section-title">Fatigue & State Detection</div>
<div class="metric">Fatigue Score: <strong><span id="fatigueScore">0</span>%</strong></div>
<div class="metric">State: <strong><span id="emotionState">Neutral</span></strong></div>
<div class="metric">State Probability: <strong><span id="emotionProb">0</span>%</strong></div>

<div id="status" class="status safe">SAFE</div>

</div>
</div>

<script src="HCAI.js"></script>

</body>
</html>
